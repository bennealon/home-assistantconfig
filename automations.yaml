- id: '1775948110088'
  alias: Tumble Dryer On when Off Peak Energy
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.octopus_energy_electricity_21l4447649_1591048740852_off_peak
    to:
    - 'on'
  conditions: []
  actions:
  - action: switch.turn_on
    metadata: {}
    target:
      entity_id: switch.tumble_dryer
    data: {}
  - if:
    - condition: time
      after: 05:30:00
      before: '23:30:00'
    then:
    - action: notify.mobile_app_cathys_iphone
      metadata: {}
      data:
        message: Off Peak Energy Started
    - action: notify.mobile_app_bens_iphone
      metadata: {}
      data:
        message: Off Peak Energy Started
  mode: single
